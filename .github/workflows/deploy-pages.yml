name: Deploy Godot Web Game
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Reassemble Godot WebAssembly engine
        shell: bash
        run: |
          cat index.wasm.part0 index.wasm.part1 index.wasm.part2 index.wasm.part3 index.wasm.part4 > index.wasm
          test "$(stat -c%s index.wasm)" -eq 39509339
          rm -f index.wasm.part0 index.wasm.part1 index.wasm.part2 index.wasm.part3 index.wasm.part4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload web build
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
