name: Deploy Godot Web Game
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Reassemble Godot WebAssembly engine
        shell: bash
        run: |
          cat index.wasm.part0 index.wasm.part1 index.wasm.part2 index.wasm.part3 index.wasm.part4 > index.wasm
          test "$(stat -c%s index.wasm)" -eq 39509339
          rm -f index.wasm.part0 index.wasm.part1 index.wasm.part2 index.wasm.part3 index.wasm.part4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload web build
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify published game files
        shell: bash
        run: |
          site="https://gachachicken888.github.io/yg-gacha-adventure"
          verified=0
          for attempt in {1..18}; do
            if curl -fsSL "$site/index.html" -o /tmp/index.html &&
               grep -q "YG Gacha Adventure" /tmp/index.html &&
               curl -fsSL "$site/index.wasm" -o /tmp/index.wasm &&
               test "$(stat -c%s /tmp/index.wasm)" -eq 39509339 &&
               curl -fsSL "$site/index.pck" -o /tmp/index.pck &&
               test "$(stat -c%s /tmp/index.pck)" -eq 16548956; then
              verified=1
              break
            fi
            sleep 10
          done
          test "$verified" -eq 1
          printf "GitHub Pages files verified successfully.\nCommit: %s\n" "$GITHUB_SHA" > deployment-verified.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment-verified.txt
          git commit -m "Record successful Pages verification [skip ci]"
          git push
