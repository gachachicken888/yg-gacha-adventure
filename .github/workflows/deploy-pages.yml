name: Deploy Godot Web Game
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Reassemble Godot WebAssembly engine
        id: reassemble
        shell: bash
        run: |
          cat index.wasm.gzpart* > index.wasm.gz
          test "$(stat -c%s index.wasm.gz)" -eq 10111653
          gzip -t index.wasm.gz
          gzip -dc index.wasm.gz > index.wasm
          test "$(stat -c%s index.wasm)" -eq 39509339
          rm -f index.wasm.gz index.wasm.gzpart*
          cat index.pck.gzpart* > index.pck.gz
          test "$(stat -c%s index.pck.gz)" -eq 16174797
          gzip -t index.pck.gz
          gzip -dc index.pck.gz > index.pck
          test "$(stat -c%s index.pck)" -eq 16556544
          rm -f index.pck.gz index.pck.gzpart*
      - name: Configure GitHub Pages
        id: configure
        uses: actions/configure-pages@v5
      - name: Upload web build
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify published game files
        id: verify
        if: steps.deployment.outcome == 'success'
        shell: bash
        run: |
          site="https://gachachicken888.github.io/yg-gacha-adventure"
          for attempt in {1..12}; do
            html_code="$(curl -L -sS --max-time 60 -o /tmp/index.html -w '%{http_code}' "$site/index.html" || true)"
            wasm_code="$(curl -L -sS --max-time 120 -o /tmp/index.wasm -w '%{http_code}' "$site/index.wasm" || true)"
            pck_code="$(curl -L -sS --max-time 120 -o /tmp/index.pck -w '%{http_code}' "$site/index.pck" || true)"
            html_size="$(stat -c%s /tmp/index.html 2>/dev/null || echo 0)"
            wasm_size="$(stat -c%s /tmp/index.wasm 2>/dev/null || echo 0)"
            pck_size="$(stat -c%s /tmp/index.pck 2>/dev/null || echo 0)"
            if test "$html_code" = "200" &&
               test "$wasm_code" = "200" &&
               test "$pck_code" = "200" &&
               test "$wasm_size" -eq 39509339 &&
               test "$pck_size" -eq 16556544; then
              break
            fi
            sleep 10
          done
          printf "html_http=%s\nhtml_size=%s\nwasm_http=%s\nwasm_size=%s\npck_http=%s\npck_size=%s\n" \
            "$html_code" "$html_size" "$wasm_code" "$wasm_size" "$pck_code" "$pck_size" > /tmp/verify-report.txt
          test "$html_code" = "200"
          test "$wasm_code" = "200"
          test "$pck_code" = "200"
          test "$wasm_size" -eq 39509339
          test "$pck_size" -eq 16556544
      - name: Record diagnostic result
        if: always()
        shell: bash
        env:
          REASSEMBLE_OUTCOME: ${{ steps.reassemble.outcome }}
          CONFIGURE_OUTCOME: ${{ steps.configure.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          git fetch origin main
          git checkout -B main origin/main
          {
            printf "reassemble=%s\n" "$REASSEMBLE_OUTCOME"
            printf "configure=%s\n" "$CONFIGURE_OUTCOME"
            printf "upload=%s\n" "$UPLOAD_OUTCOME"
            printf "deploy=%s\n" "$DEPLOY_OUTCOME"
            printf "verify=%s\n" "$VERIFY_OUTCOME"
            if test -f /tmp/verify-report.txt; then
              cat /tmp/verify-report.txt
            fi
            printf "workflow_commit=%s\n" "$GITHUB_SHA"
          } > deployment-status.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment-status.txt
          git commit -m "Record Pages diagnostic result [skip ci]"
          git push origin main
